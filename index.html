<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argentic — Film Photo Lab</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--surface3:#222;
  --border:#1e1e1e;--border2:#2e2e2e;--border3:#3a3a3a;
  --text:#e8e8e8;--text2:#999;--text3:#666;
  --accent:#c8a46e;--accent2:#a07d4f;--accent-glow:rgba(200,164,110,.1);
  --radius:14px;--radius-sm:8px;--radius-xs:6px;
  --transition:.2s ease;
  --shadow:0 2px 12px rgba(0,0,0,.4);
}
html{scroll-behavior:smooth}
body{
  font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;
}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ===== Header ===== */
header{
  text-align:center;padding:2.5rem 1.5rem 2rem;
  background:linear-gradient(180deg,rgba(200,164,110,.04) 0%,transparent 100%);
  border-bottom:1px solid var(--border);
}
header h1{
  font-size:1.8rem;font-weight:300;letter-spacing:.25em;text-transform:uppercase;
  color:var(--accent);
}
header p{
  color:var(--text3);font-size:.8rem;margin-top:.5rem;letter-spacing:.04em;font-weight:300;
}

/* ===== Upload zone ===== */
#drop-zone{
  max-width:640px;margin:2rem auto;border:1.5px dashed var(--border2);border-radius:var(--radius);
  padding:2.5rem 2rem;text-align:center;cursor:pointer;
  transition:border-color var(--transition),background var(--transition),transform var(--transition);
  background:var(--surface);
}
#drop-zone:hover{border-color:var(--accent);background:var(--accent-glow);transform:translateY(-1px)}
#drop-zone.drag-over{border-color:var(--accent);background:var(--accent-glow);transform:translateY(-2px)}
#drop-zone .icon{font-size:2rem;margin-bottom:.5rem;display:block;opacity:.5;color:var(--accent)}
#drop-zone p{color:var(--text2);font-size:.85rem}
#drop-zone p strong{color:var(--accent);font-weight:500}
#drop-zone .sub{font-size:.7rem;margin-top:.3rem;color:var(--text3)}
#file-input{display:none}
#drop-zone.success{border-color:#5a9;background:rgba(85,170,153,.05)}

/* ===== Gallery ===== */
#gallery{max-width:100%;margin:0 auto;padding:1.5rem 1.5rem 4rem;display:flex;flex-direction:column;gap:2rem}

/* ===== Download All ===== */
#download-all-row{max-width:1400px;margin:0 auto;padding:0 1.5rem;display:none}
#download-all-row.visible{display:flex;justify-content:flex-end;padding-bottom:.5rem}
#download-all-btn{
  padding:.5rem 1.4rem;border:none;border-radius:var(--radius-sm);background:var(--accent);
  color:#111;font-size:.78rem;font-weight:600;cursor:pointer;transition:all var(--transition);
}
#download-all-btn:hover{background:var(--accent2)}

/* ===== Card ===== */
.photo-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;display:grid;grid-template-columns:1fr 190px 210px;
  grid-template-rows:auto 1fr;height:78vh;
  box-shadow:var(--shadow);
  opacity:0;transform:translateY(12px);animation:cardIn .45s ease forwards;
}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}

/* ===== Filename bar ===== */
.filename-bar{
  grid-column:1/-1;padding:.55rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);
  font-size:.7rem;color:var(--text3);display:flex;align-items:center;gap:.5rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400;
}
.filename-bar .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* ===== Image area ===== */
.img-area{
  position:relative;background:#000;display:flex;align-items:center;justify-content:center;
  min-height:0;overflow:hidden;
}
.img-area canvas{max-width:100%;max-height:70vh;object-fit:contain;display:block}
.img-area .original-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;
  clip-path:inset(0 50% 0 0);pointer-events:none;z-index:2;
}
.img-area .compare-handle{
  position:absolute;top:0;left:50%;width:32px;height:100%;z-index:4;cursor:ew-resize;
  transform:translateX(-50%);display:none;
}
.img-area .compare-line{
  position:absolute;top:0;left:50%;width:2px;height:100%;background:var(--accent);
  z-index:3;pointer-events:none;display:none;box-shadow:0 0 8px rgba(200,164,110,.35);
}
.img-area .compare-dot{
  position:absolute;top:50%;left:50%;width:26px;height:26px;border-radius:50%;
  background:var(--accent);border:2px solid #fff;z-index:5;pointer-events:none;
  transform:translate(-50%,-50%);display:none;box-shadow:0 0 10px rgba(0,0,0,.5);
}
.img-area .compare-dot::before,.img-area .compare-dot::after{
  content:'';position:absolute;top:50%;width:5px;height:2px;background:#fff;border-radius:1px;
}
.img-area .compare-dot::before{left:4px;transform:translateY(-50%)}
.img-area .compare-dot::after{right:4px;transform:translateY(-50%)}
.img-area .compare-label{
  position:absolute;top:10px;z-index:6;font-size:.6rem;text-transform:uppercase;
  letter-spacing:.1em;padding:3px 10px;border-radius:4px;background:rgba(0,0,0,.6);
  backdrop-filter:blur(6px);font-weight:500;display:none;color:var(--text);
}
.img-area .label-before{left:10px}
.img-area .label-after{right:10px}

/* ===== Controls panel ===== */
.controls{display:contents}
.controls-col{
  display:flex;flex-direction:column;gap:.5rem;
  padding:.6rem;overflow-y:auto;min-height:0;
  background:var(--surface2);border-left:1px solid var(--border);
}
.controls-col>*{flex-shrink:0}

/* ===== Collapsible sections ===== */
.ctrl-details{
  border:1px solid var(--border2);border-radius:var(--radius-sm);
  overflow:hidden;background:var(--surface);
}
.ctrl-details summary{
  display:flex;align-items:center;justify-content:space-between;
  padding:.55rem .75rem;cursor:pointer;list-style:none;user-select:none;
  font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;
  color:var(--accent);font-weight:600;
  background:var(--surface);transition:background var(--transition);
}
.ctrl-details summary::-webkit-details-marker{display:none}
.ctrl-details summary::after{
  content:'';width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;
  border-top:5px solid var(--text3);transition:transform .2s ease;
}
.ctrl-details[open] summary::after{transform:rotate(180deg)}
.ctrl-details summary:hover{background:var(--surface3)}
.ctrl-details .ctrl-details-body{padding:.5rem .65rem .65rem}

/* ===== Preset grid ===== */
.preset-grid{
  display:grid;grid-template-columns:1fr;gap:.3rem;
  overflow-y:auto;padding-right:2px;
}
.preset-btn{
  background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-xs);
  padding:.35rem .5rem;color:var(--text);font-size:.72rem;cursor:pointer;
  transition:all var(--transition);text-align:left;line-height:1.3;
}
.preset-btn:hover{border-color:var(--accent2);background:var(--surface3)}
.preset-btn.active{border-color:var(--accent);background:var(--accent-glow);color:var(--accent)}
.preset-btn .preset-sub{display:block;font-size:.58rem;color:var(--text3);margin-top:1px}
.preset-btn.active .preset-sub{color:var(--accent2)}

/* ===== Mode toggle ===== */
.mode-section{
  display:flex;align-items:center;gap:.6rem;
  padding:0 .2rem;
}
.mode-section .mode-label{
  font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;
  color:var(--accent);font-weight:600;flex-shrink:0;
}
.mode-toggle{
  flex:1;display:flex;gap:0;border-radius:var(--radius-xs);overflow:hidden;
  border:1px solid var(--border2);
}
.mode-btn{
  flex:1;padding:.4rem;border:none;background:var(--surface);
  color:var(--text2);font-size:.72rem;font-weight:500;cursor:pointer;
  text-align:center;transition:all var(--transition);
}
.mode-btn:first-child{border-right:1px solid var(--border2)}
.mode-btn.active{background:var(--accent);color:#111;font-weight:600}
.mode-btn:hover:not(.active){background:var(--surface3);color:var(--text)}

.adj-scroll{max-height:35vh;overflow-y:auto}

/* ===== Sliders ===== */
.slider-row{display:flex;align-items:center;gap:.4rem;padding:.15rem 0}
.slider-row label{font-size:.7rem;color:var(--text2);min-width:64px;font-weight:400}
.slider-row input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;
  background:var(--border2);outline:none;cursor:pointer;
}
.slider-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);
  border:2px solid var(--surface);cursor:pointer;box-shadow:0 0 6px rgba(0,0,0,.4);
  transition:transform .15s ease;
}
.slider-row input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.25)}
.slider-row input[type=range]::-moz-range-thumb{
  width:13px;height:13px;border-radius:50%;background:var(--accent);
  border:2px solid var(--surface);cursor:pointer;
}
.slider-row .val{
  font-size:.65rem;color:var(--text3);min-width:22px;text-align:right;
  font-variant-numeric:tabular-nums;font-weight:500;
}

/* ===== Divider ===== */
.ctrl-divider{height:1px;background:var(--border);margin:.25rem 0}

/* ===== Buttons ===== */
.action-row{display:flex;gap:.35rem;padding-top:.25rem}
.btn{
  flex:1;padding:.45rem .5rem;border:1px solid var(--border2);border-radius:var(--radius-xs);
  background:var(--surface);color:var(--text2);font-size:.72rem;cursor:pointer;
  transition:all var(--transition);text-align:center;font-weight:500;
}
.btn:hover{border-color:var(--border3);background:var(--surface3);color:var(--text)}
.btn-primary{background:var(--accent);color:#111;border-color:var(--accent);font-weight:600}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-active{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}

/* ===== Remove button ===== */
.remove-btn{
  position:absolute;top:10px;right:10px;z-index:7;background:rgba(0,0,0,.5);border:none;
  color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:all var(--transition);
  backdrop-filter:blur(6px);opacity:.6;
}
.remove-btn:hover{background:rgba(220,50,50,.85);opacity:1}

/* ===== Crop overlay ===== */
.crop-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:crosshair;display:none}
.crop-overlay.active{display:block}
.crop-dim{position:absolute;background:rgba(0,0,0,.55);transition:none}
.crop-dim-top{top:0;left:0;width:100%}
.crop-dim-bottom{bottom:0;left:0;width:100%}
.crop-dim-left{left:0}
.crop-dim-right{right:0}
.crop-selection{position:absolute;border:2px solid var(--accent);box-shadow:0 0 0 1px rgba(0,0,0,.3)}
.crop-handle{
  position:absolute;width:11px;height:11px;background:var(--accent);border:2px solid #fff;
  border-radius:2px;z-index:2;
}
.crop-handle-tl{top:-6px;left:-6px;cursor:nw-resize}
.crop-handle-tr{top:-6px;right:-6px;cursor:ne-resize}
.crop-handle-bl{bottom:-6px;left:-6px;cursor:sw-resize}
.crop-handle-br{bottom:-6px;right:-6px;cursor:se-resize}
.crop-handle-t{top:-6px;left:50%;margin-left:-6px;cursor:n-resize}
.crop-handle-b{bottom:-6px;left:50%;margin-left:-6px;cursor:s-resize}
.crop-handle-l{top:50%;margin-top:-6px;left:-6px;cursor:w-resize}
.crop-handle-r{top:50%;margin-top:-6px;right:-6px;cursor:e-resize}

/* ===== Crop controls ===== */
.crop-section{display:none}
.crop-section.active{display:block}
.ratio-grid{display:flex;flex-wrap:wrap;gap:.25rem}
.ratio-btn{
  padding:.3rem .5rem;border:1px solid var(--border2);border-radius:var(--radius-xs);
  background:var(--surface);color:var(--text2);font-size:.65rem;cursor:pointer;
  transition:all var(--transition);
}
.ratio-btn:hover{border-color:var(--border3);background:var(--surface3)}
.ratio-btn.active{border-color:var(--accent);background:var(--accent-glow);color:var(--accent)}
.crop-actions{display:flex;gap:.35rem;margin-top:.5rem}

/* ===== AI Advisor ===== */
.ai-btn{
  background:linear-gradient(135deg,#c8a46e 0%,#e2c080 50%,#c8a46e 100%);background-size:200% 200%;
  color:#111;border:none;font-weight:700;animation:aiShimmer 3s ease infinite;
}
.ai-btn:hover{background:linear-gradient(135deg,#a07d4f 0%,#c8a46e 50%,#a07d4f 100%);color:#111;border-color:transparent}
@keyframes aiShimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.ai-btn.loading{pointer-events:none;opacity:.7}

.ai-panel{
  display:none;background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:.7rem;margin-top:.2rem;
}
.ai-panel.visible{display:block;animation:cardIn .3s ease forwards}
.ai-panel .ai-title{
  font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);
  font-weight:600;margin-bottom:.35rem;display:flex;align-items:center;gap:.35rem;
}
.ai-panel .ai-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block}
.ai-panel .ai-rec{font-size:.7rem;color:var(--text);line-height:1.6;margin-bottom:.45rem}
.ai-panel .ai-rec strong{color:var(--accent)}
.ai-panel .ai-apply{
  width:100%;padding:.38rem;border:1px solid var(--accent);border-radius:var(--radius-xs);
  background:var(--accent-glow);color:var(--accent);font-size:.7rem;font-weight:600;
  cursor:pointer;transition:all var(--transition);
}
.ai-panel .ai-apply:hover{background:var(--accent);color:#111}

/* ===== Responsive ===== */
@media(max-width:900px){
  .photo-card{grid-template-columns:1fr;height:auto;grid-template-rows:auto}
  .img-area{min-height:240px}
  .controls{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;
    border-top:1px solid var(--border);background:var(--surface2);padding:.6rem}
  .controls-col{border-left:none;min-height:auto;overflow-y:visible;background:none;padding:0}
}
@media(max-width:600px){
  header{padding:1.5rem 1rem 1.2rem}
  header h1{font-size:1.3rem}
  #drop-zone{margin:1.2rem .75rem;padding:2rem 1.2rem}
  #gallery{padding:1rem .75rem 3rem}
  .img-area{min-height:240px}
  .controls{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <h1>Argentic</h1>
  <p>Transform your photos into timeless analog film looks</p>
</header>

<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  <span class="icon">&#9678;</span>
  <p>Drag & drop photos here or <strong>click to browse</strong></p>
  <p class="sub">Accepts JPEG, PNG — multiple files supported</p>
  <input type="file" id="file-input" accept="image/*" multiple>
</div>

<div id="download-all-row"><button id="download-all-btn" onclick="downloadAll()">Download All</button></div>
<div id="gallery"></div>

<script>
const BW_PRESETS = {
  leicaM6:   { name:'Leica M6',        sub:'High contrast',          bw:true,  grain:55, contrast:75, sepia:0,  fade:5,  brightness:50, saturation:50, temperature:50 },
  leicaM3:   { name:'Leica M3',        sub:'Soft tones',             bw:true,  grain:30, contrast:50, sepia:0,  fade:10, brightness:52, saturation:50, temperature:50 },
  triX400:   { name:'Tri-X 400',       sub:'Punchy, heavy grain',    bw:true,  grain:80, contrast:70, sepia:0,  fade:15, brightness:48, saturation:50, temperature:50 },
  hp5:       { name:'Ilford HP5',      sub:'Classic tonal range',    bw:true,  grain:50, contrast:55, sepia:0,  fade:8,  brightness:50, saturation:50, temperature:50 },
  delta3200: { name:'Delta 3200',      sub:'Extreme grain',          bw:true,  grain:90, contrast:65, sepia:0,  fade:20, brightness:46, saturation:50, temperature:50 },
  tmax100:   { name:'T-Max 100',       sub:'Ultra fine grain',       bw:true,  grain:12, contrast:60, sepia:0,  fade:3,  brightness:52, saturation:50, temperature:50 },
  panF50:    { name:'Ilford Pan F',    sub:'Extremely sharp',        bw:true,  grain:8,  contrast:58, sepia:0,  fade:2,  brightness:53, saturation:50, temperature:50 },
  fp4:       { name:'Ilford FP4',      sub:'Smooth medium speed',    bw:true,  grain:25, contrast:52, sepia:0,  fade:6,  brightness:51, saturation:50, temperature:50 },
  apx100:    { name:'Agfa APX 100',    sub:'Crisp, fine detail',     bw:true,  grain:18, contrast:62, sepia:0,  fade:4,  brightness:50, saturation:50, temperature:50 },
  rolleiR80: { name:'Rollei Retro 80', sub:'Infrared-like',          bw:true,  grain:35, contrast:72, sepia:0,  fade:10, brightness:47, saturation:50, temperature:50 },
  fomapan:   { name:'Fomapan 400',     sub:'East European classic',  bw:true,  grain:65, contrast:58, sepia:0,  fade:12, brightness:49, saturation:50, temperature:50 },
  vintage:   { name:'Vintage Print',   sub:'Aged sepia tone',        bw:true,  grain:45, contrast:48, sepia:60, fade:18, brightness:52, saturation:50, temperature:55 },
};

const COLOR_PRESETS = {
  portra400:  { name:'Portra 400',     sub:'Warm skin tones',        bw:false, grain:20, contrast:45, sepia:15, fade:5,  brightness:52, saturation:55, temperature:58 },
  portra160:  { name:'Portra 160',     sub:'Pastel, fine grain',     bw:false, grain:10, contrast:42, sepia:8,  fade:3,  brightness:54, saturation:48, temperature:55 },
  superia:    { name:'Fuji Superia',   sub:'Cool, visible grain',    bw:false, grain:45, contrast:50, sepia:0,  fade:10, brightness:50, saturation:58, temperature:42 },
  ektar100:   { name:'Ektar 100',      sub:'Vivid, fine grain',      bw:false, grain:10, contrast:60, sepia:0,  fade:0,  brightness:52, saturation:72, temperature:52 },
  gold200:    { name:'Kodak Gold',     sub:'Warm nostalgic',          bw:false, grain:35, contrast:48, sepia:10, fade:8,  brightness:54, saturation:60, temperature:62 },
  ultramax:   { name:'Ultramax 400',   sub:'Everyday warm',           bw:false, grain:40, contrast:52, sepia:5,  fade:6,  brightness:52, saturation:62, temperature:58 },
  cinestill:  { name:'CineStill 800T', sub:'Cinematic tungsten',     bw:false, grain:40, contrast:55, sepia:0,  fade:12, brightness:48, saturation:55, temperature:35 },
  cinestill50:{ name:'CineStill 50D',  sub:'Daylight cinema',        bw:false, grain:15, contrast:52, sepia:0,  fade:5,  brightness:52, saturation:60, temperature:52 },
  pro400h:    { name:'Fuji Pro 400H',  sub:'Soft pastels',            bw:false, grain:18, contrast:38, sepia:0,  fade:8,  brightness:54, saturation:45, temperature:46 },
  velvia50:   { name:'Velvia 50',      sub:'Ultra saturated',         bw:false, grain:8,  contrast:68, sepia:0,  fade:0,  brightness:50, saturation:85, temperature:50 },
  provia100:  { name:'Provia 100F',    sub:'Natural, balanced',       bw:false, grain:10, contrast:55, sepia:0,  fade:2,  brightness:51, saturation:62, temperature:50 },
  lomo:       { name:'Lomography',     sub:'Saturated, punchy',       bw:false, grain:50, contrast:70, sepia:0,  fade:5,  brightness:50, saturation:80, temperature:55 },
  xpro:       { name:'Cross Process',  sub:'Green/yellow shift',      bw:false, grain:35, contrast:62, sepia:0,  fade:8,  brightness:50, saturation:70, temperature:38 },
  polaroid:   { name:'Polaroid',       sub:'Faded instant film',      bw:false, grain:25, contrast:42, sepia:12, fade:22, brightness:55, saturation:52, temperature:56 },
  fuji400h:   { name:'Fuji 400H',      sub:'Airy, overexposed',       bw:false, grain:22, contrast:40, sepia:0,  fade:15, brightness:58, saturation:42, temperature:48 },
};

const ALL_PRESETS = { ...BW_PRESETS, ...COLOR_PRESETS };

let cardId = 0;
const cards = {};

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const gallery = document.getElementById('gallery');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
  dropZone.classList.add('success');
  setTimeout(() => dropZone.classList.remove('success'), 600);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  [...files].forEach(f => { if (f.type.startsWith('image/')) addPhoto(f); });
  fileInput.value = '';
  updateDownloadAll();
}

function addPhoto(file) {
  const id = cardId++;
  const url = URL.createObjectURL(file);
  const def = ALL_PRESETS.leicaM6;
  const state = { id, url, file, fileName: file.name, preset:'leicaM6', bw:true,
    grain:def.grain, contrast:def.contrast, sepia:def.sepia, fade:def.fade,
    brightness:def.brightness, saturation:def.saturation, temperature:def.temperature,
    comparing:false, compareX:50, cropping:false, cropRatio:0, cropRect:null, croppedImg:null };
  cards[id] = state;

  const card = document.createElement('div');
  card.className = 'photo-card';
  card.id = 'card-' + id;
  card.innerHTML = buildCardHTML(id, state);
  gallery.appendChild(card);

  const img = new Image();
  img.onload = () => { state.img = img; render(id); };
  img.src = url;
  setTimeout(() => card.scrollIntoView({ behavior:'smooth', block:'center' }), 50);
}

function slider(id, param, label, val) {
  return `<div class="slider-row">
    <label>${label}</label>

    <span class="val" id="${param}-val-${id}">${val}</span>
  </div>`;
}

/* ---- State updates ---- */
function setPreset(id, key) {
  const p = ALL_PRESETS[key], s = cards[id];
  s.preset = key; s.bw = p.bw;
  for (const k of ['grain','contrast','sepia','fade','brightness','saturation','temperature']) s[k] = p[k];
  refreshControls(id);
  render(id);
}

function setMode(id, bw) {
  cards[id].bw = bw;
  const btns = document.querySelector(`#card-${id} .mode-toggle`).children;
  btns[0].classList.toggle('active', bw);
  btns[1].classList.toggle('active', !bw);
  render(id);
}

function setParam(id, param, val) {
  cards[id][param] = val;
  document.getElementById(`${param}-val-${id}`).textContent = val;
  render(id);
}

function refreshControls(id) {
  const s = cards[id], card = document.getElementById('card-' + id);
  card.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.dataset.preset === s.preset));
  const mBtns = card.querySelector('.mode-toggle').children;
  mBtns[0].classList.toggle('active', s.bw);
  mBtns[1].classList.toggle('active', !s.bw);
  for (const p of ['grain','contrast','sepia','fade','brightness','saturation','temperature']) {
    const range = card.querySelector(`input[oninput*="'${p}'"]`);
    if (range) { range.value = s[p]; document.getElementById(`${p}-val-${id}`).textContent = s[p]; }
  }
}

/* ---- Compare (draggable) ---- */
function toggleCompare(id) {
  const s = cards[id];
  s.comparing = !s.comparing;
  const orig = document.getElementById('orig-' + id);
  const line = document.getElementById('line-' + id);
  const dot = document.getElementById('dot-' + id);
  const handle = document.getElementById('chandle-' + id);
  const lb = document.getElementById('lb-' + id);
  const la = document.getElementById('la-' + id);
  const btn = document.getElementById('compare-btn-' + id);
  if (s.comparing) {
    s.compareX = 50;
    orig.src = s.url; orig.style.display = 'block'; line.style.display = 'block';
    dot.style.display = 'block'; handle.style.display = 'block';
    lb.style.display = 'block'; la.style.display = 'block';
    btn.classList.add('btn-active');
    setupCompareEvents(id);
    updateComparePosition(id, 50);
  } else {
    orig.style.display = 'none'; line.style.display = 'none';
    dot.style.display = 'none'; handle.style.display = 'none';
    lb.style.display = 'none'; la.style.display = 'none';
    btn.classList.remove('btn-active');
    if (s._compareCleanup) { s._compareCleanup(); s._compareCleanup = null; }
  }
}

function setupCompareEvents(id) {
  const handle = document.getElementById('chandle-' + id);
  const area = document.getElementById('img-area-' + id);
  let dragging = false;

  function onDown(e) { e.preventDefault(); dragging = true; }
  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const rect = area.getBoundingClientRect();
    const cx = (e.clientX || e.touches[0].clientX);
    const pct = Math.max(0, Math.min(100, ((cx - rect.left) / rect.width) * 100));
    updateComparePosition(id, pct);
  }
  function onUp() { dragging = false; }

  handle.addEventListener('mousedown', onDown);
  handle.addEventListener('touchstart', onDown, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchend', onUp);
  cards[id]._compareCleanup = () => {
    handle.removeEventListener('mousedown', onDown);
    handle.removeEventListener('touchstart', onDown);
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchend', onUp);
  };
}

function updateComparePosition(id, pct) {
  cards[id].compareX = pct;
  const orig = document.getElementById('orig-' + id);
  const line = document.getElementById('line-' + id);
  const dot = document.getElementById('dot-' + id);
  const handle = document.getElementById('chandle-' + id);
  orig.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
  line.style.left = pct + '%';
  dot.style.left = pct + '%';
  handle.style.left = pct + '%';
}

function removeCard(id) {
  document.getElementById('card-' + id).remove();
  if (cards[id]._compareCleanup) cards[id]._compareCleanup();
  URL.revokeObjectURL(cards[id].url);
  delete cards[id];
  updateDownloadAll();
}

function download(id) {
  const canvas = document.getElementById('canvas-' + id);
  const a = document.createElement('a');
  const name = cards[id].fileName.replace(/\.[^.]+$/, '');
  a.download = `${name}-argentic.jpg`;
  a.href = canvas.toDataURL('image/jpeg', 0.92);
  a.click();
}

function downloadAll() {
  for (const id of Object.keys(cards)) download(+id);
}

function updateDownloadAll() {
  const row = document.getElementById('download-all-row');
  row.classList.toggle('visible', Object.keys(cards).length > 1);
}

/* ---- Rendering ---- */
let renderQueue = {};
function render(id) {
  cancelAnimationFrame(renderQueue[id]);
  renderQueue[id] = requestAnimationFrame(() => applyEffect(id));
}

function applyEffect(id) {
  const s = cards[id];
  if (!s || !s.img) return;
  const canvas = document.getElementById('canvas-' + id);
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const img = s.croppedImg || s.img;

  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  ctx.drawImage(img, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = imageData.data;
  const len = d.length;

  const contrastF = (s.contrast - 50) / 50;
  const factor = (1 + contrastF) / (1.0001 - contrastF);
  const sepiaAmt = s.sepia / 100;
  const fadeAmt = s.fade / 100;
  const grainAmt = s.grain / 100;
  const brightShift = (s.brightness - 50) * 2.55;
  const satAmt = s.saturation / 50;
  const tempShift = (s.temperature - 50) * 1.4;

  for (let i = 0; i < len; i += 4) {
    let r = d[i], g = d[i+1], b = d[i+2];
    r += brightShift; g += brightShift; b += brightShift;
    r = factor * (r - 128) + 128;
    g = factor * (g - 128) + 128;
    b = factor * (b - 128) + 128;
    r += tempShift; b -= tempShift;
    if (satAmt !== 1) {
      const gray = 0.299 * r + 0.587 * g + 0.114 * b;
      r = gray + (r - gray) * satAmt;
      g = gray + (g - gray) * satAmt;
      b = gray + (b - gray) * satAmt;
    }
    if (s.bw) { const lum = 0.299 * r + 0.587 * g + 0.114 * b; r = g = b = lum; }
    if (sepiaAmt > 0) {
      const sr = r*.393+g*.769+b*.189, sg = r*.349+g*.686+b*.168, sb = r*.272+g*.534+b*.131;
      r += (sr-r)*sepiaAmt; g += (sg-g)*sepiaAmt; b += (sb-b)*sepiaAmt;
    }
    if (fadeAmt > 0) {
      const lift = fadeAmt * 40;
      r += (lift-r)*fadeAmt*.3; g += (lift-g)*fadeAmt*.3; b += (lift-b)*fadeAmt*.3;
    }
    if (grainAmt > 0) {
      const noise = (Math.random()-.5) * grainAmt * 120;
      r += noise; g += noise; b += noise;
    }
    d[i] = r<0?0:r>255?255:r;
    d[i+1] = g<0?0:g>255?255:g;
    d[i+2] = b<0?0:b>255?255:b;
  }
  ctx.putImageData(imageData, 0, 0);
}

/* ---- Crop system ---- */
function toggleCrop(id) {
  const s = cards[id];
  if (s.cropping) { cancelCrop(id); return; }
  s.cropping = true; s.cropRatio = 0;
  document.getElementById('crop-overlay-' + id).classList.add('active');
  document.getElementById('crop-section-' + id).classList.add('active');
  const btn = document.getElementById('crop-btn-' + id);
  btn.textContent = 'Cropping\u2026'; btn.classList.add('btn-active');
  initCropRect(id);
}

function cancelCrop(id) {
  cards[id].cropping = false; cards[id].cropRect = null;
  document.getElementById('crop-overlay-' + id).classList.remove('active');
  document.getElementById('crop-section-' + id).classList.remove('active');
  const btn = document.getElementById('crop-btn-' + id);
  btn.textContent = 'Crop'; btn.classList.remove('btn-active');
}

function getCanvasBounds(id) {
  const overlay = document.getElementById('crop-overlay-' + id);
  const canvas = document.getElementById('canvas-' + id);
  const oRect = overlay.getBoundingClientRect();
  const cRect = canvas.getBoundingClientRect();
  return {
    x: cRect.left - oRect.left,
    y: cRect.top - oRect.top,
    w: cRect.width,
    h: cRect.height
  };
}

function initCropRect(id) {
  const cb = getCanvasBounds(id);
  const m = 0.1;
  cards[id].cropRect = { x: cb.x + cb.w*m, y: cb.y + cb.h*m, w: cb.w*(1-2*m), h: cb.h*(1-2*m) };
  updateCropUI(id);
  setupCropEvents(id);
}

function updateCropUI(id) {
  const s = cards[id]; if (!s.cropRect) return;
  const cr = s.cropRect;
  const overlay = document.getElementById('crop-overlay-' + id);
  const ow = overlay.offsetWidth, oh = overlay.offsetHeight;
  const sel = document.getElementById('crop-sel-' + id);
  sel.style.left = cr.x+'px'; sel.style.top = cr.y+'px';
  sel.style.width = cr.w+'px'; sel.style.height = cr.h+'px';
  document.getElementById('cdim-t-'+id).style.height = cr.y+'px';
  document.getElementById('cdim-b-'+id).style.height = (oh-cr.y-cr.h)+'px';
  const dl = document.getElementById('cdim-l-'+id);
  dl.style.top=cr.y+'px'; dl.style.height=cr.h+'px'; dl.style.width=cr.x+'px';
  const dr = document.getElementById('cdim-r-'+id);
  dr.style.top=cr.y+'px'; dr.style.height=cr.h+'px'; dr.style.width=(ow-cr.x-cr.w)+'px';
}

function setupCropEvents(id) {
  const overlay = document.getElementById('crop-overlay-'+id);
  const sel = document.getElementById('crop-sel-'+id);
  let drag = null;
  function onDown(e) {
    e.preventDefault();
    const rect = overlay.getBoundingClientRect();
    const mx = (e.clientX||e.touches[0].clientX)-rect.left;
    const my = (e.clientY||e.touches[0].clientY)-rect.top;
    const handle = e.target.dataset?.handle;
    const cr = cards[id].cropRect;
    if (handle) drag = {type:'handle',handle,startX:mx,startY:my,orig:{...cr}};
    else if (e.target===sel||sel.contains(e.target)) drag = {type:'move',startX:mx,startY:my,orig:{...cr}};
    else drag = {type:'new',startX:mx,startY:my};
  }
  function onMove(e) {
    if (!drag) return; e.preventDefault();
    const rect = overlay.getBoundingClientRect();
    const mx = Math.max(0,Math.min((e.clientX||e.touches[0].clientX)-rect.left,rect.width));
    const my = Math.max(0,Math.min((e.clientY||e.touches[0].clientY)-rect.top,rect.height));
    const cr = cards[id].cropRect, ow = rect.width, oh = rect.height, ratio = cards[id].cropRatio;
    if (drag.type==='move') {
      let nx=drag.orig.x+(mx-drag.startX), ny=drag.orig.y+(my-drag.startY);
      cr.x=Math.max(0,Math.min(nx,ow-cr.w)); cr.y=Math.max(0,Math.min(ny,oh-cr.h));
    } else if (drag.type==='new') {
      let w=Math.abs(mx-drag.startX), h=Math.abs(my-drag.startY);
      if (ratio>0) h=w/ratio;
      cr.x=Math.min(drag.startX,mx); cr.y=Math.min(drag.startY,my);
      cr.w=Math.max(20,w); cr.h=Math.max(20,h);
    } else {
      const o=drag.orig; let nx=cr.x,ny=cr.y,nw=cr.w,nh=cr.h;
      const dx=mx-drag.startX, dy=my-drag.startY, h=drag.handle;
      if (h.includes('l')){nx=Math.min(o.x+dx,o.x+o.w-20);nw=o.w-(nx-o.x)}
      if (h.includes('r')) nw=Math.max(20,o.w+dx);
      if (h.includes('t')){ny=Math.min(o.y+dy,o.y+o.h-20);nh=o.h-(ny-o.y)}
      if (h.includes('b')) nh=Math.max(20,o.h+dy);
      if (ratio>0){if(h==='t'||h==='b')nw=nh*ratio;else nh=nw/ratio}
      cr.x=Math.max(0,nx);cr.y=Math.max(0,ny);cr.w=Math.min(nw,ow-cr.x);cr.h=Math.min(nh,oh-cr.y);
    }
    updateCropUI(id);
  }
  function onUp(){drag=null}
  overlay.onmousedown=onDown; overlay.ontouchstart=onDown;
  document.addEventListener('mousemove',onMove);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('mouseup',onUp);
  document.addEventListener('touchend',onUp);
  cards[id]._cropCleanup=()=>{
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('mouseup',onUp);
    document.removeEventListener('touchend',onUp);
  };
}

function setCropRatio(id, ratio) {
  cards[id].cropRatio = ratio;
  const btns = document.querySelectorAll(`#crop-section-${id} .ratio-btn`);
  const ratios = [0,1,4/5,4/3,16/9,3/2];
  btns.forEach((b,i) => b.classList.toggle('active', ratios[i]===ratio));
  if (ratio>0 && cards[id].cropRect) { cards[id].cropRect.h = cards[id].cropRect.w/ratio; updateCropUI(id); }
}

function applyCrop(id) {
  const s = cards[id]; if (!s.cropRect) return;
  const cr = s.cropRect;
  const src = s.croppedImg||s.img;
  const cb = getCanvasBounds(id);

  const cx = Math.max(0, cr.x - cb.x);
  const cy = Math.max(0, cr.y - cb.y);
  const cx2 = Math.min(cb.w, cr.x + cr.w - cb.x);
  const cy2 = Math.min(cb.h, cr.y + cr.h - cb.y);
  if (cx2 <= cx || cy2 <= cy) return;

  const scX = src.naturalWidth / cb.w;
  const scY = src.naturalHeight / cb.h;
  const tmp = document.createElement('canvas');
  tmp.width = Math.round((cx2-cx)*scX);
  tmp.height = Math.round((cy2-cy)*scY);
  tmp.getContext('2d').drawImage(src, cx*scX, cy*scY, (cx2-cx)*scX, (cy2-cy)*scY, 0, 0, tmp.width, tmp.height);
  const newImg = new Image();
  newImg.onload = () => {
    s.croppedImg = newImg; cancelCrop(id);
    if (s._cropCleanup){s._cropCleanup();s._cropCleanup=null}
    render(id);
  };
  newImg.src = tmp.toDataURL('image/png');
  document.getElementById('reset-crop-btn-'+id).style.display='';
}

function resetCrop(id) {
  cards[id].croppedImg = null; cancelCrop(id);
  document.getElementById('reset-crop-btn-'+id).style.display='none';
  render(id);
}

/* ---- AI Photo Advisor ---- */
function aiAdvise(id) {
  const s = cards[id];
  if (!s || !s.img) return;
  const btn = document.getElementById('ai-btn-' + id);
  btn.textContent = 'Analyzing\u2026'; btn.classList.add('loading');

  setTimeout(() => {
    const analysis = analyzeImage(s.croppedImg || s.img);
    const rec = recommend(analysis);
    s._aiRec = rec;

    const panel = document.getElementById('ai-panel-' + id);
    document.getElementById('ai-rec-' + id).innerHTML = rec.explanation;
    panel.classList.add('visible');
    btn.textContent = 'AI Advisor'; btn.classList.remove('loading');
  }, 400);
}

function aiApply(id) {
  const s = cards[id];
  if (!s._aiRec) return;
  const rec = s._aiRec;
  s.preset = rec.preset; s.bw = rec.bw;
  s.brightness = rec.brightness; s.contrast = rec.contrast;
  s.saturation = rec.saturation; s.temperature = rec.temperature;
  s.grain = rec.grain; s.sepia = rec.sepia; s.fade = rec.fade;
  refreshControls(id);
  render(id);
}

function analyzeImage(img) {
  const c = document.createElement('canvas');
  const size = 200;
  const ratio = img.naturalWidth / img.naturalHeight;
  c.width = size; c.height = Math.round(size / ratio);
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, c.width, c.height);
  const data = ctx.getImageData(0, 0, c.width, c.height).data;
  const px = data.length / 4;

  let sumR=0, sumG=0, sumB=0, sumLum=0, sumSat=0;
  let darkPx=0, brightPx=0, skinPx=0;
  let lumArr = [];
  const hist = new Array(256).fill(0);

  for (let i=0; i<data.length; i+=4) {
    const r=data[i], g=data[i+1], b=data[i+2];
    sumR+=r; sumG+=g; sumB+=b;
    const lum = 0.299*r + 0.587*g + 0.114*b;
    sumLum += lum;
    lumArr.push(lum);
    hist[Math.min(255, Math.round(lum))]++;

    const max=Math.max(r,g,b), min=Math.min(r,g,b);
    const sat = max===0 ? 0 : (max-min)/max;
    sumSat += sat;

    if (lum < 40) darkPx++;
    if (lum > 215) brightPx++;

    const h = rgbToHue(r,g,b);
    if (sat > 0.15 && lum > 50 && lum < 220 && h >= 5 && h <= 50 && r > g && r > b) skinPx++;
  }

  const avgR=sumR/px, avgG=sumG/px, avgB=sumB/px;
  const avgLum = sumLum/px;
  const avgSat = sumSat/px;
  const darkRatio = darkPx/px;
  const brightRatio = brightPx/px;
  const skinRatio = skinPx/px;
  const warmth = (avgR - avgB) / 255;

  let lumVariance = 0;
  for (const l of lumArr) lumVariance += (l - avgLum) ** 2;
  lumVariance = Math.sqrt(lumVariance / px);

  let p5=0, p95=0, cum=0;
  for (let i=0;i<256;i++) { cum+=hist[i]; if(!p5 && cum>=px*0.05) p5=i; if(!p95 && cum>=px*0.95) p95=i; }
  const dynamicRange = p95 - p5;

  return { avgLum, lumVariance, avgSat, warmth, darkRatio, brightRatio, skinRatio, dynamicRange, avgR, avgG, avgB };
}

function rgbToHue(r,g,b) {
  const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
  if (d===0) return 0;
  let h;
  if (max===r) h=((g-b)/d)%6;
  else if (max===g) h=(b-r)/d+2;
  else h=(r-g)/d+4;
  h=Math.round(h*60); if(h<0) h+=360;
  return h;
}

function recommend(a) {
  let preset, presetName, reason, tips = [];
  let bw, brightness, contrast, saturation, temperature, grain, sepia, fade;

  const isPortrait = a.skinRatio > 0.08;
  const isDark = a.avgLum < 85;
  const isBright = a.avgLum > 170;
  const isHighContrast = a.dynamicRange > 180;
  const isLowContrast = a.dynamicRange < 100;
  const isWarm = a.warmth > 0.08;
  const isCool = a.warmth < -0.05;
  const isColorful = a.avgSat > 0.35;
  const isMuted = a.avgSat < 0.18;

  if (isPortrait && !isDark) {
    if (isMuted || isLowContrast) {
      preset='portra160'; presetName='Portra 160';
      reason = 'soft, muted portrait — the pastel tones of Portra 160 will enhance skin without over-saturating';
    } else {
      preset='portra400'; presetName='Portra 400';
      reason = 'portrait with good tones — Portra 400 is the gold standard for flattering skin rendering';
    }
    bw = false;
    tips.push('Portra\'s warm bias naturally flatters skin tones');
    if (a.avgLum < 110) tips.push('Slightly lifted brightness to open up shadows on the face');
  } else if (isDark && isHighContrast) {
    preset='triX400'; presetName='Tri-X 400';
    reason = 'dark, contrasty scene — Tri-X 400\'s punchy character thrives in dramatic lighting';
    bw = true;
    tips.push('Heavy grain adds grit that suits the mood');
  } else if (isDark && !isHighContrast) {
    preset='delta3200'; presetName='Delta 3200';
    reason = 'low-light scene — Delta 3200 was designed for pushing in dim conditions, its heavy grain feels authentic';
    bw = true;
    tips.push('Boosted brightness to recover shadow detail');
  } else if (isBright && isColorful) {
    preset='velvia50'; presetName='Velvia 50';
    reason = 'bright and colorful — Velvia 50 is the legendary slide film for saturated landscapes and vivid scenes';
    bw = false;
    tips.push('Velvia\'s ultra saturation makes colours pop like a transparency on a lightbox');
  } else if (isBright && !isColorful) {
    preset='fuji400h'; presetName='Fuji 400H';
    reason = 'bright but soft colours — Fuji 400H\'s airy quality gives an ethereal, overexposed feel';
    bw = false;
    tips.push('The lifted shadows and gentle desaturation create a dreamy look');
  } else if (isHighContrast && isColorful) {
    preset='ektar100'; presetName='Ektar 100';
    reason = 'high contrast with rich colours — Ektar 100 delivers punchy saturation with fine grain, like a vivid print';
    bw = false;
  } else if (isHighContrast && isMuted) {
    preset='leicaM6'; presetName='Leica M6';
    reason = 'high contrast with subdued colours — the Leica M6 look thrives on dramatic tonal range in B&W';
    bw = true;
    tips.push('The strong contrast is already there — letting B&W reveal the geometry of light');
  } else if (isWarm) {
    preset='gold200'; presetName='Kodak Gold';
    reason = 'warm scene — Kodak Gold leans into golden tones, giving a nostalgic, sun-drenched feel';
    bw = false;
    tips.push('Gold\'s amber shift amplifies the existing warmth beautifully');
  } else if (isCool) {
    preset='cinestill'; presetName='CineStill 800T';
    reason = 'cool tones detected — CineStill 800T\'s tungsten balance was made for blue-shifted, cinematic scenes';
    bw = false;
    tips.push('The halation and cool cast give a filmic, nocturnal atmosphere');
  } else if (isLowContrast) {
    preset='provia100'; presetName='Provia 100F';
    reason = 'even lighting, gentle tones — Provia 100F adds subtle structure without overwhelming the scene';
    bw = false;
    tips.push('A slight contrast boost brings out dimension while staying natural');
  } else {
    preset='hp5'; presetName='Ilford HP5';
    reason = 'balanced scene — HP5 is the versatile all-rounder that handles any subject with classic elegance';
    bw = true;
    tips.push('HP5\'s forgiving tonal range adapts beautifully to almost anything');
  }

  const p = ALL_PRESETS[preset];
  brightness = p.brightness;
  contrast = p.contrast;
  saturation = p.saturation;
  temperature = p.temperature;
  grain = p.grain;
  sepia = p.sepia;
  fade = p.fade;

  if (isDark) brightness = Math.min(62, brightness + 8);
  if (isBright) brightness = Math.max(42, brightness - 6);
  if (isLowContrast && !bw) contrast = Math.min(70, contrast + 8);
  if (isMuted && !bw) saturation = Math.min(75, saturation + 10);

  let explanation = `<strong>${presetName}</strong> — ${reason}.`;
  if (tips.length) explanation += '<br>' + tips.map(t => '\u2022 ' + t).join('<br>');

  const details = [];
  if (brightness !== p.brightness) details.push(`Brightness ${brightness > p.brightness ? 'lifted' : 'lowered'} to ${brightness}`);
  if (contrast !== p.contrast) details.push(`Contrast nudged to ${contrast}`);
  if (saturation !== p.saturation) details.push(`Saturation adjusted to ${saturation}`);
  if (details.length) explanation += '<br><br><em>Fine-tuned: ' + details.join(', ') + '</em>';

  return { preset, bw, brightness, contrast, saturation, temperature, grain, sepia, fade, explanation };
}
