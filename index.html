<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argentic — Film Photo Lab</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111;--surface:#1a1a1a;--surface2:#232323;--border:#333;
  --text:#e8e8e8;--text2:#999;--accent:#c8a46e;--accent2:#a07d4f;
  --radius:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent)}

/* Header */
header{text-align:center;padding:2rem 1rem 1rem;border-bottom:1px solid var(--border)}
header h1{font-size:1.8rem;font-weight:300;letter-spacing:.15em;text-transform:uppercase;color:var(--accent)}
header p{color:var(--text2);font-size:.85rem;margin-top:.3rem;letter-spacing:.05em}

/* Upload zone */
#drop-zone{
  max-width:700px;margin:2rem auto;border:2px dashed var(--border);border-radius:var(--radius);
  padding:3rem 2rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;
}
#drop-zone:hover,#drop-zone.drag-over{border-color:var(--accent);background:rgba(200,164,110,.06)}
#drop-zone p{color:var(--text2);font-size:.95rem}
#drop-zone .big{font-size:2.5rem;margin-bottom:.5rem;display:block}
#file-input{display:none}

/* Gallery */
#gallery{max-width:1400px;margin:0 auto;padding:1rem;display:flex;flex-direction:column;gap:2rem}

/* Card */
.photo-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;
  display:grid;grid-template-columns:1fr 320px;gap:0;
}
@media(max-width:900px){.photo-card{grid-template-columns:1fr}}

/* Image area */
.img-area{position:relative;background:#000;display:flex;align-items:center;justify-content:center;min-height:350px;overflow:hidden}
.img-area canvas,.img-area img{max-width:100%;max-height:70vh;object-fit:contain;display:block}
.img-area .original-overlay{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;clip-path:inset(0 50% 0 0);pointer-events:none;z-index:2}
.img-area .compare-line{position:absolute;top:0;left:50%;width:2px;height:100%;background:var(--accent);z-index:3;pointer-events:none;display:none}
.img-area .compare-label{position:absolute;top:8px;z-index:4;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;padding:3px 8px;border-radius:4px;background:rgba(0,0,0,.65)}
.img-area .label-before{left:8px}
.img-area .label-after{right:8px}

/* Controls panel */
.controls{padding:1.2rem;display:flex;flex-direction:column;gap:.9rem;overflow-y:auto;max-height:70vh}
.controls h3{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin-bottom:.2rem}

/* Preset grid */
.preset-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem}
.preset-btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.45rem .5rem;
  color:var(--text);font-size:.78rem;cursor:pointer;transition:all .15s;text-align:left;
}
.preset-btn:hover{border-color:var(--accent);background:rgba(200,164,110,.1)}
.preset-btn.active{border-color:var(--accent);background:rgba(200,164,110,.15);color:var(--accent)}
.preset-btn .preset-sub{display:block;font-size:.65rem;color:var(--text2);margin-top:1px}

/* Mode toggle */
.mode-toggle{display:flex;gap:.4rem}
.mode-btn{
  flex:1;padding:.4rem;border:1px solid var(--border);border-radius:6px;background:var(--surface2);
  color:var(--text);font-size:.78rem;cursor:pointer;text-align:center;transition:all .15s;
}
.mode-btn.active{border-color:var(--accent);background:rgba(200,164,110,.15);color:var(--accent)}

/* Sliders */
.slider-row{display:flex;align-items:center;gap:.5rem}
.slider-row label{font-size:.78rem;color:var(--text2);min-width:62px}
.slider-row input[type=range]{flex:1;accent-color:var(--accent);height:4px}
.slider-row .val{font-size:.72rem;color:var(--text2);min-width:28px;text-align:right}

/* Buttons */
.action-row{display:flex;gap:.5rem;margin-top:auto;padding-top:.5rem}
.btn{
  flex:1;padding:.55rem .8rem;border:1px solid var(--border);border-radius:6px;background:var(--surface2);
  color:var(--text);font-size:.8rem;cursor:pointer;transition:all .15s;text-align:center;
}
.btn:hover{border-color:var(--accent);background:rgba(200,164,110,.1)}
.btn-primary{background:var(--accent);color:#111;border-color:var(--accent);font-weight:600}
.btn-primary:hover{background:var(--accent2)}

/* Remove button */
.remove-btn{
  position:absolute;top:8px;right:8px;z-index:5;background:rgba(0,0,0,.6);border:none;
  color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:background .15s;
}
.remove-btn:hover{background:rgba(200,50,50,.8)}

/* Crop overlay */
.crop-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:crosshair;display:none;
}
.crop-overlay.active{display:block}
.crop-dim{position:absolute;background:rgba(0,0,0,.55)}
.crop-dim-top{top:0;left:0;width:100%}
.crop-dim-bottom{bottom:0;left:0;width:100%}
.crop-dim-left{left:0}
.crop-dim-right{right:0}
.crop-selection{
  position:absolute;border:2px solid var(--accent);box-shadow:0 0 0 1px rgba(0,0,0,.3);
}
.crop-handle{
  position:absolute;width:12px;height:12px;background:var(--accent);border:2px solid #fff;
  border-radius:2px;z-index:2;
}
.crop-handle-tl{top:-6px;left:-6px;cursor:nw-resize}
.crop-handle-tr{top:-6px;right:-6px;cursor:ne-resize}
.crop-handle-bl{bottom:-6px;left:-6px;cursor:sw-resize}
.crop-handle-br{bottom:-6px;right:-6px;cursor:se-resize}
.crop-handle-t{top:-6px;left:50%;margin-left:-6px;cursor:n-resize}
.crop-handle-b{bottom:-6px;left:50%;margin-left:-6px;cursor:s-resize}
.crop-handle-l{top:50%;margin-top:-6px;left:-6px;cursor:w-resize}
.crop-handle-r{top:50%;margin-top:-6px;right:-6px;cursor:e-resize}

/* Crop controls */
.crop-section{display:none}
.crop-section.active{display:block}
.ratio-grid{display:flex;flex-wrap:wrap;gap:.3rem}
.ratio-btn{
  padding:.3rem .55rem;border:1px solid var(--border);border-radius:5px;background:var(--surface2);
  color:var(--text);font-size:.72rem;cursor:pointer;transition:all .15s;
}
.ratio-btn:hover{border-color:var(--accent);background:rgba(200,164,110,.1)}
.ratio-btn.active{border-color:var(--accent);background:rgba(200,164,110,.15);color:var(--accent)}
.crop-actions{display:flex;gap:.4rem;margin-top:.5rem}
</style>
</head>
<body>

<header>
  <h1>Argentic</h1>
  <p>Transform your photos into timeless analog film looks</p>
</header>

<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  <span class="big">📷</span>
  <p>Drag & drop photos here or <strong>click to browse</strong></p>
  <p style="font-size:.75rem;margin-top:.4rem;color:#666">Accepts JPEG, PNG — multiple files supported</p>
  <input type="file" id="file-input" accept="image/*" multiple>
</div>

<div id="gallery"></div>

<script>
const PRESETS = {
  leicaM6:    { name:'Leica M6',        sub:'High contrast B&W',       bw:true,  grain:55, contrast:75, sepia:0,  fade:5,  brightness:50, saturation:50, temperature:50 },
  leicaM3:    { name:'Leica M3',        sub:'Soft tones B&W',          bw:true,  grain:30, contrast:50, sepia:0,  fade:10, brightness:52, saturation:50, temperature:50 },
  triX400:    { name:'Tri-X 400',       sub:'Punchy, heavy grain',     bw:true,  grain:80, contrast:70, sepia:0,  fade:15, brightness:48, saturation:50, temperature:50 },
  hp5:        { name:'Ilford HP5',      sub:'Classic tonal range',     bw:true,  grain:50, contrast:55, sepia:0,  fade:8,  brightness:50, saturation:50, temperature:50 },
  delta3200:  { name:'Delta 3200',      sub:'High ISO, extreme grain', bw:true,  grain:90, contrast:65, sepia:0,  fade:20, brightness:46, saturation:50, temperature:50 },
  tmax100:    { name:'T-Max 100',       sub:'Ultra fine grain B&W',    bw:true,  grain:12, contrast:60, sepia:0,  fade:3,  brightness:52, saturation:50, temperature:50 },
  portra400:  { name:'Portra 400',      sub:'Warm skin tones',         bw:false, grain:20, contrast:45, sepia:15, fade:5,  brightness:52, saturation:55, temperature:58 },
  superia:    { name:'Fuji Superia',    sub:'Cool tones, visible grain', bw:false, grain:45, contrast:50, sepia:0, fade:10, brightness:50, saturation:58, temperature:42 },
  ektar100:   { name:'Ektar 100',       sub:'Vivid colours, fine grain', bw:false, grain:10, contrast:60, sepia:0, fade:0,  brightness:52, saturation:72, temperature:52 },
  gold200:    { name:'Kodak Gold',      sub:'Warm nostalgic tones',    bw:false, grain:35, contrast:48, sepia:10, fade:8,  brightness:54, saturation:60, temperature:62 },
  cinestill:  { name:'CineStill 800T',  sub:'Cinematic tungsten',      bw:false, grain:40, contrast:55, sepia:0,  fade:12, brightness:48, saturation:55, temperature:35 },
  lomo:       { name:'Lomography',      sub:'High saturation, punchy',   bw:false, grain:50, contrast:70, sepia:0, fade:5,  brightness:50, saturation:80, temperature:55 },
};

let cardId = 0;
const cards = {};

/* ---- Upload handling ---- */
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const gallery = document.getElementById('gallery');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  [...files].forEach(f => { if (f.type.startsWith('image/')) addPhoto(f); });
  fileInput.value = '';
}

/* ---- Add a photo card ---- */
function addPhoto(file) {
  const id = cardId++;
  const url = URL.createObjectURL(file);
  const state = { id, url, file, preset:'leicaM6', bw:true, grain:55, contrast:75, sepia:0, fade:5, brightness:50, saturation:50, temperature:50, comparing:false, cropping:false, cropRatio:0, cropRect:null, croppedImg:null };
  cards[id] = state;

  const card = document.createElement('div');
  card.className = 'photo-card';
  card.id = 'card-' + id;
  card.innerHTML = buildCardHTML(id, state);
  gallery.appendChild(card);

  const img = new Image();
  img.onload = () => { state.img = img; render(id); };
  img.src = url;
}

function buildCardHTML(id, s) {
  let presetBtns = '';
  for (const [key, p] of Object.entries(PRESETS)) {
    presetBtns += `<button class="preset-btn${s.preset===key?' active':''}" data-preset="${key}" onclick="setPreset(${id},'${key}')">${p.name}<span class="preset-sub">${p.sub}</span></button>`;
  }
  return `
    <div class="img-area" id="img-area-${id}">
      <button class="remove-btn" onclick="removeCard(${id})" title="Remove">×</button>
      <canvas id="canvas-${id}"></canvas>
      <img id="orig-${id}" class="original-overlay" style="display:none">
      <div class="compare-line" id="line-${id}"></div>
      <span class="compare-label label-before" id="lb-${id}" style="display:none">Before</span>
      <span class="compare-label label-after" id="la-${id}" style="display:none">After</span>
      <div class="crop-overlay" id="crop-overlay-${id}">
        <div class="crop-dim crop-dim-top" id="cdim-t-${id}"></div>
        <div class="crop-dim crop-dim-bottom" id="cdim-b-${id}"></div>
        <div class="crop-dim crop-dim-left" id="cdim-l-${id}"></div>
        <div class="crop-dim crop-dim-right" id="cdim-r-${id}"></div>
        <div class="crop-selection" id="crop-sel-${id}">
          <div class="crop-handle crop-handle-tl" data-handle="tl"></div>
          <div class="crop-handle crop-handle-tr" data-handle="tr"></div>
          <div class="crop-handle crop-handle-bl" data-handle="bl"></div>
          <div class="crop-handle crop-handle-br" data-handle="br"></div>
          <div class="crop-handle crop-handle-t" data-handle="t"></div>
          <div class="crop-handle crop-handle-b" data-handle="b"></div>
          <div class="crop-handle crop-handle-l" data-handle="l"></div>
          <div class="crop-handle crop-handle-r" data-handle="r"></div>
        </div>
      </div>
    </div>
    <div class="controls">
      <h3>Preset</h3>
      <div class="preset-grid" id="presets-${id}">${presetBtns}</div>

      <h3>Mode</h3>
      <div class="mode-toggle">
        <button class="mode-btn${s.bw?' active':''}" onclick="setMode(${id},true)">B&W</button>
        <button class="mode-btn${!s.bw?' active':''}" onclick="setMode(${id},false)">Colour</button>
      </div>

      <h3>Adjustments</h3>
      ${slider(id,'brightness','Brightness',s.brightness)}
      ${slider(id,'contrast','Contrast',s.contrast)}
      ${slider(id,'saturation','Saturation',s.saturation)}
      ${slider(id,'temperature','Temp',s.temperature)}
      ${slider(id,'grain','Grain',s.grain)}
      ${slider(id,'sepia','Sepia',s.sepia)}
      ${slider(id,'fade','Fade',s.fade)}

      <div class="crop-section" id="crop-section-${id}">
        <h3>Crop Ratio</h3>
        <div class="ratio-grid">
          <button class="ratio-btn active" onclick="setCropRatio(${id},0)">Free</button>
          <button class="ratio-btn" onclick="setCropRatio(${id},1)">1:1</button>
          <button class="ratio-btn" onclick="setCropRatio(${id},4/5)">4:5</button>
          <button class="ratio-btn" onclick="setCropRatio(${id},4/3)">4:3</button>
          <button class="ratio-btn" onclick="setCropRatio(${id},16/9)">16:9</button>
          <button class="ratio-btn" onclick="setCropRatio(${id},3/2)">3:2</button>
        </div>
        <div class="crop-actions">
          <button class="btn" onclick="cancelCrop(${id})">Cancel</button>
          <button class="btn btn-primary" onclick="applyCrop(${id})">Apply Crop</button>
        </div>
      </div>

      <div class="action-row">
        <button class="btn" onclick="toggleCrop(${id})" id="crop-btn-${id}">✂ Crop</button>
        <button class="btn" onclick="resetCrop(${id})" id="reset-crop-btn-${id}" style="display:none">↩ Reset</button>
        <button class="btn" onclick="toggleCompare(${id})">Before / After</button>
        <button class="btn btn-primary" onclick="download(${id})">↓ Download</button>
      </div>
    </div>`;
}

function slider(id, param, label, val) {
  return `<div class="slider-row">
    <label>${label}</label>
    <input type="range" min="0" max="100" value="${val}" oninput="setParam(${id},'${param}',+this.value)">
    <span class="val" id="${param}-val-${id}">${val}</span>
  </div>`;
}

/* ---- State updates ---- */
function setPreset(id, key) {
  const p = PRESETS[key], s = cards[id];
  s.preset = key; s.bw = p.bw;
  for (const k of ['grain','contrast','sepia','fade','brightness','saturation','temperature'])
    s[k] = p[k];
  refreshControls(id);
  render(id);
}

function setMode(id, bw) {
  cards[id].bw = bw;
  const btns = document.querySelector(`#card-${id} .mode-toggle`).children;
  btns[0].classList.toggle('active', bw);
  btns[1].classList.toggle('active', !bw);
  render(id);
}

function setParam(id, param, val) {
  cards[id][param] = val;
  document.getElementById(`${param}-val-${id}`).textContent = val;
  render(id);
}

function refreshControls(id) {
  const s = cards[id], card = document.getElementById('card-' + id);
  // Preset buttons
  card.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.dataset.preset === s.preset));
  // Mode buttons
  const mBtns = card.querySelector('.mode-toggle').children;
  mBtns[0].classList.toggle('active', s.bw);
  mBtns[1].classList.toggle('active', !s.bw);
  // Sliders
  for (const p of ['grain','contrast','sepia','fade','brightness','saturation','temperature']) {
    const range = card.querySelector(`input[oninput*="'${p}'"]`);
    if (range) { range.value = s[p]; document.getElementById(`${p}-val-${id}`).textContent = s[p]; }
  }
}

function toggleCompare(id) {
  const s = cards[id];
  s.comparing = !s.comparing;
  const orig = document.getElementById('orig-' + id);
  const line = document.getElementById('line-' + id);
  const lb = document.getElementById('lb-' + id);
  const la = document.getElementById('la-' + id);
  if (s.comparing) {
    orig.src = s.url; orig.style.display = 'block'; line.style.display = 'block';
    lb.style.display = 'block'; la.style.display = 'block';
  } else {
    orig.style.display = 'none'; line.style.display = 'none';
    lb.style.display = 'none'; la.style.display = 'none';
  }
}

function removeCard(id) {
  document.getElementById('card-' + id).remove();
  URL.revokeObjectURL(cards[id].url);
  delete cards[id];
}

function download(id) {
  const canvas = document.getElementById('canvas-' + id);
  const a = document.createElement('a');
  a.download = `argentic-${Date.now()}.jpg`;
  a.href = canvas.toDataURL('image/jpeg', 0.92);
  a.click();
}

/* ---- Rendering / image processing ---- */
let renderQueue = {};
function render(id) {
  cancelAnimationFrame(renderQueue[id]);
  renderQueue[id] = requestAnimationFrame(() => applyEffect(id));
}

function applyEffect(id) {
  const s = cards[id];
  if (!s || !s.img) return;
  const canvas = document.getElementById('canvas-' + id);
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const img = s.croppedImg || s.img;

  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  ctx.drawImage(img, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = imageData.data;
  const len = d.length;

  const contrastF = (s.contrast - 50) / 50;
  const factor = (1 + contrastF) / (1.0001 - contrastF);
  const sepiaAmt = s.sepia / 100;
  const fadeAmt = s.fade / 100;
  const grainAmt = s.grain / 100;
  const brightShift = (s.brightness - 50) * 2.55;
  const satAmt = s.saturation / 50;
  const tempShift = (s.temperature - 50) * 1.4;

  for (let i = 0; i < len; i += 4) {
    let r = d[i], g = d[i+1], b = d[i+2];

    // Brightness
    r += brightShift; g += brightShift; b += brightShift;

    // Contrast
    r = factor * (r - 128) + 128;
    g = factor * (g - 128) + 128;
    b = factor * (b - 128) + 128;

    // Temperature (warm = +red -blue, cool = -red +blue)
    r += tempShift;
    b -= tempShift;

    // Saturation (before B&W so it affects colour presets)
    if (satAmt !== 1) {
      const gray = 0.299 * r + 0.587 * g + 0.114 * b;
      r = gray + (r - gray) * satAmt;
      g = gray + (g - gray) * satAmt;
      b = gray + (b - gray) * satAmt;
    }

    // B&W
    if (s.bw) {
      const lum = 0.299 * r + 0.587 * g + 0.114 * b;
      r = g = b = lum;
    }

    // Sepia
    if (sepiaAmt > 0) {
      const sr = r * 0.393 + g * 0.769 + b * 0.189;
      const sg = r * 0.349 + g * 0.686 + b * 0.168;
      const sb = r * 0.272 + g * 0.534 + b * 0.131;
      r = r + (sr - r) * sepiaAmt;
      g = g + (sg - g) * sepiaAmt;
      b = b + (sb - b) * sepiaAmt;
    }

    // Fade (lift blacks)
    if (fadeAmt > 0) {
      const lift = fadeAmt * 40;
      r = r + (lift - r) * fadeAmt * 0.3;
      g = g + (lift - g) * fadeAmt * 0.3;
      b = b + (lift - b) * fadeAmt * 0.3;
    }

    // Grain
    if (grainAmt > 0) {
      const noise = (Math.random() - 0.5) * grainAmt * 120;
      r += noise; g += noise; b += noise;
    }

    d[i]   = clamp(r);
    d[i+1] = clamp(g);
    d[i+2] = clamp(b);
  }

  ctx.putImageData(imageData, 0, 0);
}

function clamp(v) { return v < 0 ? 0 : v > 255 ? 255 : v; }

/* ---- Crop system ---- */
function toggleCrop(id) {
  const s = cards[id];
  if (s.cropping) { cancelCrop(id); return; }
  s.cropping = true;
  s.cropRatio = 0;
  const overlay = document.getElementById('crop-overlay-' + id);
  const section = document.getElementById('crop-section-' + id);
  overlay.classList.add('active');
  section.classList.add('active');
  document.getElementById('crop-btn-' + id).textContent = '✂ Cropping…';
  initCropRect(id);
}

function cancelCrop(id) {
  const s = cards[id];
  s.cropping = false;
  s.cropRect = null;
  document.getElementById('crop-overlay-' + id).classList.remove('active');
  document.getElementById('crop-section-' + id).classList.remove('active');
  document.getElementById('crop-btn-' + id).textContent = '✂ Crop';
}

function initCropRect(id) {
  const overlay = document.getElementById('crop-overlay-' + id);
  const w = overlay.offsetWidth, h = overlay.offsetHeight;
  const margin = 0.1;
  cards[id].cropRect = { x: w * margin, y: h * margin, w: w * (1 - 2 * margin), h: h * (1 - 2 * margin) };
  updateCropUI(id);
  setupCropEvents(id);
}

function updateCropUI(id) {
  const s = cards[id];
  if (!s.cropRect) return;
  const cr = s.cropRect;
  const overlay = document.getElementById('crop-overlay-' + id);
  const ow = overlay.offsetWidth, oh = overlay.offsetHeight;
  const sel = document.getElementById('crop-sel-' + id);

  sel.style.left = cr.x + 'px'; sel.style.top = cr.y + 'px';
  sel.style.width = cr.w + 'px'; sel.style.height = cr.h + 'px';

  document.getElementById('cdim-t-' + id).style.height = cr.y + 'px';
  const bTop = cr.y + cr.h;
  document.getElementById('cdim-b-' + id).style.height = (oh - bTop) + 'px';
  const dl = document.getElementById('cdim-l-' + id);
  dl.style.top = cr.y + 'px'; dl.style.height = cr.h + 'px'; dl.style.width = cr.x + 'px';
  const dr = document.getElementById('cdim-r-' + id);
  dr.style.top = cr.y + 'px'; dr.style.height = cr.h + 'px'; dr.style.width = (ow - cr.x - cr.w) + 'px';
}

function setupCropEvents(id) {
  const overlay = document.getElementById('crop-overlay-' + id);
  const sel = document.getElementById('crop-sel-' + id);
  let drag = null;

  function onDown(e) {
    e.preventDefault();
    const rect = overlay.getBoundingClientRect();
    const mx = (e.clientX || e.touches[0].clientX) - rect.left;
    const my = (e.clientY || e.touches[0].clientY) - rect.top;
    const handle = e.target.dataset?.handle;
    const cr = cards[id].cropRect;
    if (handle) {
      drag = { type: 'handle', handle, startX: mx, startY: my, orig: { ...cr } };
    } else if (e.target === sel || sel.contains(e.target)) {
      drag = { type: 'move', startX: mx, startY: my, orig: { ...cr } };
    } else {
      drag = { type: 'new', startX: mx, startY: my };
    }
  }

  function onMove(e) {
    if (!drag) return;
    e.preventDefault();
    const rect = overlay.getBoundingClientRect();
    const mx = Math.max(0, Math.min((e.clientX || e.touches[0].clientX) - rect.left, rect.width));
    const my = Math.max(0, Math.min((e.clientY || e.touches[0].clientY) - rect.top, rect.height));
    const cr = cards[id].cropRect;
    const ow = rect.width, oh = rect.height;
    const ratio = cards[id].cropRatio;

    if (drag.type === 'move') {
      let nx = drag.orig.x + (mx - drag.startX);
      let ny = drag.orig.y + (my - drag.startY);
      nx = Math.max(0, Math.min(nx, ow - cr.w));
      ny = Math.max(0, Math.min(ny, oh - cr.h));
      cr.x = nx; cr.y = ny;
    } else if (drag.type === 'new') {
      let x1 = Math.min(drag.startX, mx), y1 = Math.min(drag.startY, my);
      let w = Math.abs(mx - drag.startX), h = Math.abs(my - drag.startY);
      if (ratio > 0) { h = w / ratio; }
      cr.x = x1; cr.y = y1; cr.w = Math.max(20, w); cr.h = Math.max(20, h);
    } else if (drag.type === 'handle') {
      const o = drag.orig;
      let nx = cr.x, ny = cr.y, nw = cr.w, nh = cr.h;
      const dx = mx - drag.startX, dy = my - drag.startY;
      const h = drag.handle;
      if (h.includes('l')) { nx = Math.min(o.x + dx, o.x + o.w - 20); nw = o.w - (nx - o.x); }
      if (h.includes('r')) { nw = Math.max(20, o.w + dx); }
      if (h.includes('t')) { ny = Math.min(o.y + dy, o.y + o.h - 20); nh = o.h - (ny - o.y); }
      if (h.includes('b')) { nh = Math.max(20, o.h + dy); }
      if (ratio > 0) {
        if (h === 't' || h === 'b') { nw = nh * ratio; }
        else { nh = nw / ratio; }
      }
      cr.x = Math.max(0, nx); cr.y = Math.max(0, ny);
      cr.w = Math.min(nw, ow - cr.x); cr.h = Math.min(nh, oh - cr.y);
    }
    updateCropUI(id);
  }

  function onUp() { drag = null; }

  overlay.onmousedown = onDown; overlay.ontouchstart = onDown;
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchend', onUp);
  cards[id]._cropCleanup = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchend', onUp);
  };
}

function setCropRatio(id, ratio) {
  cards[id].cropRatio = ratio;
  const btns = document.querySelectorAll(`#crop-section-${id} .ratio-btn`);
  const labels = ['Free','1:1','4:5','4:3','16:9','3:2'];
  const ratios = [0, 1, 4/5, 4/3, 16/9, 3/2];
  btns.forEach((b, i) => b.classList.toggle('active', ratios[i] === ratio));
  if (ratio > 0 && cards[id].cropRect) {
    const cr = cards[id].cropRect;
    cr.h = cr.w / ratio;
    updateCropUI(id);
  }
}

function applyCrop(id) {
  const s = cards[id];
  if (!s.cropRect) return;
  const overlay = document.getElementById('crop-overlay-' + id);
  const canvas = document.getElementById('canvas-' + id);
  const ow = overlay.offsetWidth, oh = overlay.offsetHeight;
  const cr = s.cropRect;
  const sourceImg = s.croppedImg || s.img;
  const scaleX = sourceImg.naturalWidth / ow;
  const scaleY = sourceImg.naturalHeight / oh;
  const sx = cr.x * scaleX, sy = cr.y * scaleY;
  const sw = cr.w * scaleX, sh = cr.h * scaleY;

  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = Math.round(sw); tmpCanvas.height = Math.round(sh);
  tmpCanvas.getContext('2d').drawImage(sourceImg, sx, sy, sw, sh, 0, 0, tmpCanvas.width, tmpCanvas.height);

  const newImg = new Image();
  newImg.onload = () => {
    s.croppedImg = newImg;
    cancelCrop(id);
    if (s._cropCleanup) { s._cropCleanup(); s._cropCleanup = null; }
    render(id);
  };
  newImg.src = tmpCanvas.toDataURL('image/png');
  document.getElementById('reset-crop-btn-' + id).style.display = '';
}

function resetCrop(id) {
  cards[id].croppedImg = null;
  cancelCrop(id);
  document.getElementById('reset-crop-btn-' + id).style.display = 'none';
  render(id);
}
</script>
</body>
</html>
